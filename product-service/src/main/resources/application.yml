# -----------------------------------------------------------------------------
# product-service's OWN application.yml
# -----------------------------------------------------------------------------
# See order-service/src/main/resources/application.yml for the full explanation
# of every property below; the wiring is identical, only spring.application.name
# and server.port differ.
# -----------------------------------------------------------------------------

spring:
  application:
    name: product-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      name: product-service
      label: main
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 1000
        multiplier: 1.5
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

server:
  port: 8082
