# -----------------------------------------------------------------------------
# order-service's OWN application.yml
# -----------------------------------------------------------------------------
# Deliberately tiny. In the Config Server model, a client only needs to know
# its own name (so the server can find <name>.yml / <name>-<profile>.yml) and
# WHERE the Config Server is. Everything else (datasource, business rules,
# actuator exposure, logging) is resolved remotely at startup and merged into
# this application's Environment before any @Configuration classes run.
# -----------------------------------------------------------------------------

spring:
  application:
    name: order-service
  config:
    # Spring Boot 3.x / Spring Cloud 2022+ style config-client wiring: no
    # bootstrap.yml needed. "optional:" means order-service will still start
    # (falling back to whatever is defined right here) even if config-server
    # is temporarily unreachable, which is friendlier while learning/debugging.
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      # Must match the file names in config-repo (order-service.yml / order-service-docker.yml).
      name: order-service
      # "label" maps to a Git branch for a git-backed repo; for the native backend it is
      # ignored, but wiring it up now means switching backends later needs no client changes.
      label: main
      fail-fast: true
      retry:
        max-attempts: 5
        initial-interval: 1000
        multiplier: 1.5
  profiles:
    # Selects which order-service-<profile>.yml overlay Config Server applies on
    # top of the base order-service.yml. Overridden to "docker" in docker-compose.yml.
    active: ${SPRING_PROFILES_ACTIVE:default}

server:
  port: 8081
