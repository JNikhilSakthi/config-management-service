services:

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - config-net
    healthcheck:
      # order-service/product-service must NOT start resolving config until
      # config-server itself is fully up; this healthcheck is what
      # "depends_on: condition: service_healthy" below polls.
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      # Overrides the default:http://localhost:8888 fallback in
      # order-service/application.yml with the compose network's DNS name.
      CONFIG_SERVER_URL: http://config-server:8888
      # Selects the order-service-docker.yml overlay from config-repo/.
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    networks:
      - config-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8082:8082"
    networks:
      - config-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  config-net:
    driver: bridge
