app:
  product:
    welcome-message: "Product Service is running with configuration fetched from Config Server (profile=docker, label=main)."
    low-stock-threshold: 10
    price-currency: "INR"

logging:
  level:
    com.medha.configmanagementservice.productservice: DEBUG
