# -----------------------------------------------------------------------------
# product-service.yml (config-repo)
# -----------------------------------------------------------------------------
# Base configuration for any client with spring.application.name=product-service.
# -----------------------------------------------------------------------------

server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  product:
    welcome-message: "Product Service is running with configuration fetched from Config Server (profile=default, label=main)."
    low-stock-threshold: 5
    price-currency: "INR"

logging:
  level:
    com.medha.configmanagementservice.productservice: INFO
